specVersion: 0.0.4
description: Subgraph for BlockDoc contract on Sepolia

schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum/contract
    name: BlockDoc
    network: hardhat
    source:
      address: '0x5FbDB2315678afecb367f032d93F642f64180aa3'
      abi: BlockDoc
      startBlock: 0

    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: typescript

      entities:
        - JournalRecord

      abis:
        - name: BlockDoc
          file: ./config/BlockDocAbi.json

      eventHandlers:
        - event: RecordAdded(indexed bytes32,bytes32,indexed address,uint8,uint256)
          handler: handleRecordAdded

      file: ./mappings/addRecordHandler.ts
